<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  measurementId: "G-7X66GRSMGF"
};

const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.addDoc = addDoc;
  window.collection = collection;
    
<script>
let pedidos = [];

window.mostrarFormulario = function () {
    document.getElementById("formulario").style.display = "block";
}

async function actualizarHorarios() {

    const snapshot = await getDocs(collection(db, "pedidos"));

    let horariosOcupados = [];

    snapshot.forEach(doc => {
        let data = doc.data();
        if(data.tiempo && data.tiempo !== "Lo más pronto posible"){
            horariosOcupados.push(data.tiempo);
        }
    });

    let select = document.getElementById("tiempo");

    for(let i = 0; i < select.options.length; i++){
        let option = select.options[i];

        if(horariosOcupados.includes(option.value)){
            option.style.display = "none";
        }
    }
}

window.hacerPedido = async function(){

    function actualizarEstado() {
    let total = pedidos.length;
    let tiempo = document.getElementById("tiempo").value;

    document.getElementById("estadoServicio").innerHTML = `
        Pedidos en cola: ${total} <br>
        Tiempo estimado: ${total * 5} min
    `;
}
    let nombre = document.getElementById("nombre").value;
    let producto = document.getElementById("producto").value;

    await addDoc(collection(db, "pedidos"), {
        nombre: nombre,
        producto: producto,
        tiempo: tiempo,
        estado: "En preparación",
        timestamp: Date.now()
    });

    alert("Pedido enviado");
}

window.actualizarPedidos = function() {
    let contenedor = document.getElementById("listaPedidos");
    contenedor.innerHTML = "";

    pedidos.forEach((p, index)=>{
        let div = document.createElement("div");
        div.className = "card";

        let tiempo = (index + 1) * 5;

        div.innerHTML = `
        <b>${p.nombre}</b><br>
        ${p.producto} ${p.extras.length ? "("+p.extras.join(", ")+")" : ""}<br>
        Estado: ${p.estado}<br>
        Turno: ${index + 1}<br>
        Tiempo estimado: ${tiempo} min<br>
        <button onclick="cancelar(${index})">Cancelar</button>
        });

        contenedor.appendChild(div);
    });

    document.getElementById("estadoServicio").innerHTML = `
    Pedidos en cola: ${pedidos.length} <br>
    Tiempo estimado: ${pedidos.length * 5} min
    `;
}

function cancelar(i){
    pedidos.splice(i,1);
    actualizarPedidos();
    actualizarHorarios();
}
</script>
