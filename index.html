<!DOCTYPE html>
<html>

<head>
<title>Cafetería El Quinto Piso</title>

<style>

body {
    font-family: Arial;
    margin: 0;
    background-color: #f5f5f5;
}

header {
    background-color: #2c2c2c;
    color: white;
    padding: 20px;
    text-align: center;
}

section {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

.button {
    background-color: #8B0000;
    color: white;
    padding: 10px;
    text-decoration: none;
    border-radius: 5px;
}

.estado {
    font-weight: bold;
}

</style>

</head>

<body>

<header>
    <h1>Cafetería El Quinto Piso ☕</h1>
    <p>Haz tu pedido antes de bajar</p>
</header>

<section>
    <h2>📋 Menú</h2>

    <div class="card">Chilaquiles verdes</div>
    <div class="card">Chilaquiles rojos</div>
    <div class="card">Sándwich integral</div>
    <div class="card">Té</div>
    <div class="card">Coca Cola</div>
</section>

<section>
    <h2>⏱ Estado del servicio</h2>

    <div class="card estado">
        Pedidos en cola: 3 <br>
        Empleados disponibles: 1 <br>
        Tiempo estimado: 12 minutos
    </div>
</section>

<section>
    <h2>🛒 Pedidos</h2>

    <a class="button" href="#">Hacer pedido</a>
</section>

</body>

</html>
