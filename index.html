<!DOCTYPE html>
<html>

<head>
<title>Cafetería El Quinto Piso</title>

<style>

body {
    font-family: Arial;
    margin: 0;
    background-color: #f5f5f5;
}

header {
    background-color: #2c2c2c;
    color: white;
    padding: 20px;
    text-align: center;
}

section {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

.button {
    background-color: #8B0000;
    color: white;
    padding: 10px;
    text-decoration: none;
    border-radius: 5px;
}

.estado {
    font-weight: bold;
}

</style>

</head>

<body>

<header>
    <h1>Cafetería El Quinto Piso ☕</h1>
    <p>Haz tu pedido antes de bajar</p>
</header>

<section>
    <h2>📋 Menú</h2>

    <div class="card">Chilaquiles verdes</div>
    <div class="card">Chilaquiles rojos</div>
    <div class="card">Sándwich integral</div>
    <div class="card">Té</div>
    <div class="card">Coca Cola</div>
</section>

<section>
    <h2>⏱ Estado del servicio</h2>

    <div class="card estado">
        Pedidos en cola: 3 <br>
        Empleados disponibles: 1 <br>
        Tiempo estimado: 12 minutos
    </div>
</section>

<section>
    <h2>🛒 Pedidos</h2>

    <button class="button" onclick="mostrarFormulario()">Hacer pedido</button>

    <div id="formulario" style="display:none; margin-top:20px;" class="card">

<h3>Nuevo Pedido</h3>

<input id="nombre" placeholder="Nombre y Apellido"><br><br>

<input id="piso" placeholder="Piso"><br><br>

<select id="zona">
    <option>Oriente</option>
    <option>Poniente</option>
</select><br><br>

<select id="producto">
    <option>Molletes</option>
    <option>Chilaquiles</option>
    <option>Sandwich</option>
    <option>Hot Dog</option>
</select><br><br>

<select id="entrega">
    <option>Recoger en cafetería</option>
    <option>Comer ahí</option>
    <option>Entrega en oficina</option>
</select><br><br>

<button class="button" onclick="hacerPedido()">Confirmar pedido</button>

</div>
    
</section>

<section>
    <h2>📦 Pedidos en curso</h2>
    <div id="listaPedidos"></div>
</section>

<script>

let pedidos = [];

function mostrarFormulario(){
    document.getElementById("formulario").style.display = "block";
}

function hacerPedido(){

    let nombre = document.getElementById("nombre").value;
    let producto = document.getElementById("producto").value;

    let pedido = {
        nombre: nombre,
        producto: producto,
        estado: "En preparación"
    };

    pedidos.push(pedido);

    actualizarPedidos();
}

function actualizarPedidos(){

    let contenedor = document.getElementById("listaPedidos");
    contenedor.innerHTML = "";

    pedidos.forEach((p, index)=>{

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
        ${p.nombre} - ${p.producto} <br>
        Estado: ${p.estado}
        `;

        contenedor.appendChild(div);

    });
}

</script>
    
</body>

</html>
