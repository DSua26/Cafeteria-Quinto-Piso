<!DOCTYPE html>
<html>

<head>
<title>Cafetería El Quinto Piso</title>

<style>
body { font-family: Arial; margin: 0; background-color: #f5f5f5; }
header { background-color: #2c2c2c; color: white; padding: 20px; text-align: center; }
section { padding: 20px; }
.card { background: white; padding: 10px; margin: 8px 0; border-radius: 10px; }
.button { background-color: #8B0000; color: white; padding: 10px; border-radius: 5px; border: none; }
.estado { font-weight: bold; }
.menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.small { font-size: 14px; }
</style>

</head>

<body>

<header>
    <h1>Cafetería El Quinto Piso ☕</h1>
    <p>Haz tu pedido antes de bajar</p>
</header>

<section>
    <h2>📋 Menú</h2>

    <div class="menu-grid">
        <div class="card">Molletes</div>
        <div class="card">Chilaquiles</div>
        <div class="card">Sandwich</div>
        <div class="card">Hot Dog</div>
        <div class="card">Sincronizadas</div>
        <div class="card">Tortas</div>
    </div>
</section>

<section>
    <h2>⏱ Estado del servicio</h2>

    <div class="card estado" id="estadoServicio">
        Pedidos en cola: 0 <br>
        Tiempo estimado: 0 min
    </div>
</section>

<section>
    <h2>🛒 Pedidos</h2>

    <button class="button" onclick="mostrarFormulario()">Hacer pedido</button>

    <div id="formulario" style="display:none; margin-top:20px;" class="card">

    <h3>Nuevo Pedido</h3>

    <input id="nombre" placeholder="Nombre y Apellido"><br><br>
    <input id="piso" placeholder="Piso"><br><br>

    <select id="zona">
        <option>Oriente</option>
        <option>Poniente</option>
    </select><br><br>

    <select id="producto">
        <option>Molletes</option>
        <option>Chilaquiles</option>
        <option>Sandwich</option>
        <option>Hot Dog</option>
    </select><br><br>

    <select id="extras" multiple class="small">
        <option>Jamón</option>
        <option>Tocino</option>
        <option>Chorizo</option>
        <option>Queso</option>
    </select><br><br>

    <select id="entrega">
        <option>Recoger en cafetería</option>
        <option>Comer ahí</option>
        <option>Entrega en oficina</option>
    </select><br><br>

    <select id="tiempo">
        <option>Lo antes posible</option>
        <option>En 30 minutos</option>
        <option>En 1 hora</option>
    </select><br><br>

    <button class="button" onclick="hacerPedido()">Confirmar pedido</button>

    </div>
</section>

<section>
    <h2>📦 Pedidos en curso</h2>
    <div id="listaPedidos"></div>
</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyCTGbs7bpa-VPJWvaOFwO8HTmmXRHjEPmU",
  authDomain: "cafeteria-quinto-piso-88921.firebaseapp.com",
  projectId: "cafeteria-quinto-piso-88921",
  storageBucket: "cafeteria-quinto-piso-88921.firebasestorage.app",
  messagingSenderId: "1010904728833",
  appId: "1:1010904728833:web:d1494b6397289d6d6d8700",
  measurementId: "G-7X66GRSMGF"
};

const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.addDoc = addDoc;
  window.collection = collection;
    
<script>

    
let pedidos = [];

function mostrarFormulario(){
    document.getElementById("formulario").style.display = "block";
}

window.hacerPedido = async function(){

    let nombre = document.getElementById("nombre").value;
    let producto = document.getElementById("producto").value;

    await addDoc(collection(db, "pedidos"), {
        nombre: nombre,
        producto: producto,
        estado: "En preparación",
        timestamp: Date.now()
    });

    alert("Pedido enviado");
}

    pedidos.push(pedido);

    actualizarPedidos();
}

function actualizarPedidos(){
    let contenedor = document.getElementById("listaPedidos");
    contenedor.innerHTML = "";

    pedidos.forEach((p, index)=>{
        let div = document.createElement("div");
        div.className = "card";

        let tiempo = (index + 1) * 5;

        div.innerHTML = `
        <b>${p.nombre}</b><br>
        ${p.producto} ${p.extras.length ? "("+p.extras.join(", ")+")" : ""}<br>
        Estado: ${p.estado}<br>
        Turno: ${index + 1}<br>
        Tiempo estimado: ${tiempo} min<br>
        <button onclick="cancelar(${index})">Cancelar</button>
        `;

        contenedor.appendChild(div);
    });

    document.getElementById("estadoServicio").innerHTML = `
    Pedidos en cola: ${pedidos.length} <br>
    Tiempo estimado: ${pedidos.length * 5} min
    `;
}

function cancelar(i){
    pedidos.splice(i,1);
    actualizarPedidos();
}
</script>

</body>
</html>
